# Pull-through registry cache — one instance per host (Host A, Host B, ...),
# per the architecture note in the work order: there is currently no shared
# egress via the VPS, so each host pulls (and caches) independently over its
# own internet connection.
#
# `registry:2` in proxy mode caches at the layer level (its default
# behaviour), so images sharing base layers (postgres:15/16, etc.) benefit
# automatically without any image-specific configuration.
#
# Deploy: this is the first thing that needs Docker on Host A/B — the
# devplat-agent binary itself runs directly on the host (see the main
# README), not in a container.
#
#   docker compose -f docker-compose.registry-cache.yml up -d
#
# Docker Hub credentials are OPTIONAL. Leave DOCKERHUB_USERNAME/DOCKERHUB_TOKEN
# unset and the cache does anonymous pull-through — the cache itself is what
# keeps you under the limit, since repeat pulls of the same layer are served
# from disk and never touch Docker Hub. Only the initial cold fetch of each
# distinct layer counts against the rate limit; anonymous that's ~100 pulls
# per 6h per IP, which a warm cache almost never reaches in steady state.
# If you DO have credentials (even a *free* Docker Hub account raises the
# limit above anonymous), set the two env vars in .env — see .env.example.

services:
  registry-cache:
    image: registry:2
    restart: unless-stopped
    ports:
      # Bound to all interfaces (not just the WireGuard IP): every VM on
      # this host reaches it at its own gateway IP (a distinct address per
      # VM slot — see internal/vmmanager/network.go), so the daemon can't
      # be pinned to one address. It's still only reachable from inside the
      # host's own VM network (the tap subnets) or from the host itself —
      # nothing routes to it from the public internet, since none of the
      # tap subnets are exposed there.
      - "5000:5000"
      # Debug/expvar endpoint, bound to loopback ONLY. The devplat-agent runs
      # directly on the host (not in a container) and scrapes
      # http://127.0.0.1:5001/debug/vars for the registry proxy's cumulative
      # Hits/Misses, which becomes the dashboard's image-cache hit rate. Must
      # NOT be exposed beyond the host — it also serves pprof.
      - "127.0.0.1:5001:5001"
    environment:
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
      # Optional — see the header comment. `:-` makes them default to empty
      # when unset, so `docker compose` doesn't warn and the proxy falls back
      # to anonymous pull-through instead of failing.
      REGISTRY_PROXY_USERNAME: ${DOCKERHUB_USERNAME:-}
      REGISTRY_PROXY_PASSWORD: ${DOCKERHUB_TOKEN:-}
      # Layers are cached to disk indefinitely by default; without a TTL
      # this container's disk would only grow. 168h = 7 days.
      REGISTRY_PROXY_TTL: 168h
      # Enables the expvar/pprof debug listener the agent scrapes for cache
      # stats (see the 5001 loopback port mapping above).
      REGISTRY_HTTP_DEBUG_ADDR: ":5001"
    volumes:
      - registry-cache-data:/var/lib/registry

volumes:
  registry-cache-data:
